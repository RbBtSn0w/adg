name: Sync main to beta

# Keep the beta integration branch aligned with main after a release. When a
# `beta -> main` release merges, semantic-release pushes a
# `chore(release): x.y.z` commit back onto main. We trigger off the CI workflow
# *completing* on main (by which point the release commit already exists) and
# open a back-merge PR (main -> beta), then merge it automatically when it is
# conflict-free. If `main` does not merge cleanly into `beta` (usually
# version-line conflicts in package.json / CHANGELOG.md), the PR is left open
# and labelled `manual-sync-needed` for a human to resolve. Going through a PR
# (rather than a raw push) keeps beta's branch rules and CI in the loop.
# Idempotent: re-triggers no-op when a sync PR is already open or beta is current.
#
# NOTE: `workflow_run` always runs the copy of this file on the default branch
# (main), so edits here only take effect after they reach main via a release.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # merge the back-merge PR when it is conflict-free
  pull-requests: write

concurrency:
  group: sync-main-to-beta
  cancel-in-progress: false

jobs:
  open-backmerge-pr:
    name: Open back-merge PR
    # Skip failed CI runs; manual dispatch always proceeds.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      # Reuse the release-bot App to mint a short-lived token. A PR opened with
      # an App token DOES trigger pull_request CI (unlike GITHUB_TOKEN), so the
      # sync PR can satisfy beta's required checks without a separate PAT.
      # Requires the App installed on this repo with pull-requests: write.
      - name: Mint release-bot token
        id: bot
        # continue-on-error: if the App id is set but the private key is missing/
        # invalid or the App isn't installed, don't abort the job — leave the
        # token empty so the next step falls back to SYNC_TOKEN / GITHUB_TOKEN.
        if: ${{ vars.RELEASE_BOT_APP_ID != '' }}
        continue-on-error: true
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - name: Open and auto-merge back-merge PR
        # Token preference: release-bot App > optional SYNC_TOKEN override >
        # GITHUB_TOKEN. The first two open a PR that triggers CI and can merge
        # it; the GITHUB_TOKEN fallback still opens/merges but its push does not
        # trigger the pull_request CI.
        env:
          GH_TOKEN: ${{ steps.bot.outputs.token || secrets.SYNC_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch --quiet origin main beta
          ahead="$(git rev-list --count origin/beta..origin/main)"
          if [ "$ahead" -eq 0 ]; then
            echo "beta is already up to date with main; nothing to sync."
            exit 0
          fi
          echo "main is ${ahead} commit(s) ahead of beta."

          # Ensure a back-merge PR exists (reuse an open one for idempotency).
          pr="$(gh pr list --base beta --head main --state open --json number --jq '.[0].number' 2>/dev/null || true)"
          if [ -z "$pr" ]; then
            gh pr create --base beta --head main \
              --title "chore: sync main into beta" \
              --body $'Automated back-merge to keep `beta` aligned with `main` after a release.\n\nThis PR is auto-merged with a **merge commit** when `main` merges cleanly into `beta`. If it is still open and labelled `manual-sync-needed`, the automatic merge was skipped due to conflicts (usually `package.json` / `CHANGELOG.md` version lines) — resolve manually with a **merge commit** favouring `main`; semantic-release continues the next prerelease from there.'
            pr="$(gh pr list --base beta --head main --state open --json number --jq '.[0].number')"
          fi
          echo "Back-merge PR #${pr}."

          # Detect conflicts with a local trial merge (more reliable than the
          # async mergeable flag): clean -> auto-merge; conflict -> leave for a
          # human. Never touches the real beta ref; the merge itself goes
          # through `gh pr merge` so beta's rules still apply.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -q -B sync-trial origin/beta
          if git merge --no-commit --no-ff origin/main >/dev/null 2>&1; then
            git merge --abort 2>/dev/null || true
            echo "No conflicts; auto-merging PR #${pr} with a merge commit."
            # --delete-branch=false: the head branch is `main` — never delete it.
            gh pr merge "$pr" --merge --delete-branch=false
          else
            git merge --abort 2>/dev/null || true
            echo "Conflicts detected; leaving PR #${pr} open for manual resolution."
            gh label create manual-sync-needed --color D93F0B \
              --description "Back-merge needs manual conflict resolution" 2>/dev/null || true
            gh pr edit "$pr" --add-label manual-sync-needed 2>/dev/null || true
            gh pr comment "$pr" --body "Automatic back-merge skipped: \`main\` does not merge cleanly into \`beta\` (likely version-line conflicts in \`package.json\` / \`CHANGELOG.md\`). Resolve manually with a **merge commit** favouring \`main\`." 2>/dev/null || true
          fi
